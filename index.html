function toast(msg, ms = 3000) {
  let el = $('#toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-surface border border-edge px-4 py-2 rounded-full text-[0.82rem] z-[100] hidden';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.add('hidden'), ms);
}

async function loadProfile(userId, attempt = 0) {
  const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).maybeSingle();
  if (!data && attempt < 4) {
    await new Promise(r => setTimeout(r, 400));
    return loadProfile(userId, attempt + 1);
  }
  if (error) console.error('Gagal load profile:', error);
  return data || null;
}

async function refreshSession() {
  const { data: { session } } = await supabase.auth.getSession();
  state.session = session;
  state.profile = session ? await loadProfile(session.user.id) : null;
  updateBannedOverlay();
}

function loginWithDiscord() {
  supabase.auth.signInWithOAuth({ provider: 'discord' });
}

async function logout() {
  await supabase.auth.signOut();
  state.session = null;
  state.profile = null;
  location.hash = '#/';
  render();
}

supabase.auth.onAuthStateChange(async (event, session) => {
  state.session = session;
  state.profile = session ? await loadProfile(session.user.id) : null;
  updateBannedOverlay();
  render();

  if (event === 'SIGNED_IN' && !localStorage.getItem('kg_seen_onboarding')) {
    showOnboarding();
  }
});

async function loadConfig() {
  const { data, error } = await supabase.from('site_config').select('key, value');
  if (error) { console.error(error); return {}; }
  const cfg = {};
  for (const row of data) cfg[row.key] = row.value;
  return cfg;
}

async function saveConfig(key, value) {
  const { error } = await supabase.rpc('update_site_config', { config_key: key, config_value: value });
  if (error) { toast('Gagal simpan: ' + error.message); return false; }
  state.config[key] = value;
  return true;
}

// ================================================================
// HERO: canvas glitch-grid background (ringan, ga pakai WebGL)
// ================================================================
function startHeroCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  let w, h, cols, rows;
  const cell = 22;
  let cells = [];

  function resize() {
    w = canvas.width = canvas.offsetWidth;
    h = canvas.height = canvas.offsetHeight;
    cols = Math.ceil(w / cell);
    rows = Math.ceil(h / cell);
    cells = Array.from({ length: cols * rows }, () => Math.random());
  }
  resize();
  window.addEventListener('resize', resize);

  let raf;
  function tick() {
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(76,224,210,0.08)';
    for (let x = 0; x <= cols; x++) { ctx.beginPath(); ctx.moveTo(x * cell, 0); ctx.lineTo(x * cell, h); ctx.stroke(); }
    for (let y = 0; y <= rows; y++) { ctx.beginPath(); ctx.moveTo(0, y * cell); ctx.lineTo(w, y * cell); ctx.stroke(); }

    for (let i = 0; i < cells.length; i++) {
      cells[i] += (Math.random() - 0.5) * 0.15;
      if (Math.random() < 0.002) cells[i] = 1;
      cells[i] = Math.max(0, Math.min(1, cells[i] * 0.94));
      if (cells[i] > 0.15) {
        const cxp = (i % cols) * cell, cyp = Math.floor(i / cols) * cell;
        ctx.fillStyle = `rgba(76,224,210,${cells[i] * 0.5})`;
        ctx.fillRect(cxp, cyp, cell - 2, cell - 2);
      }
    }
    raf = requestAnimationFrame(tick);
  }
  tick();
  return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
}

// ---------- "shuffle" text buat badge tanggal, versi ringan pakai JS biasa ----------
function shuffleInto(el, finalText, charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789') {
  let frame = 0;
  const totalFrames = 14;
  const timer = setInterval(() => {
    frame++;
    const progress = frame / totalFrames;
    const revealCount = Math.floor(progress * finalText.length);
    let out = '';
    for (let i = 0; i < finalText.length; i++) {
      if (finalText[i] === ' ') { out += ' '; continue; }
      out += i < revealCount ? finalText[i] : charset[Math.floor(Math.random() * charset.length)];
    }
    el.textContent = out;
    if (frame >= totalFrames) { el.textContent = finalText; clearInterval(timer); }
  }, 35);
}

  shuffleInto($('#hero-date'), `${HARI[now.getDay()]} ${now.getDate()} ${BULAN[now.getMonth()]} ${now.getFullYear()}`);
  $('#hero-login')?.addEventListener('click', loginWithDiscord);

  renderStats();
  startStatsAutoRefresh();
  renderLogoStrip(branding);
  renderUpdatesList();
}

function startStatsAutoRefresh() {
  stopStatsAutoRefresh();
  state.statsInterval = setInterval(renderStats, 15000);
}
function stopStatsAutoRefresh() {
  if (state.statsInterval) clearInterval(state.statsInterval);
  state.statsInterval = null;
}

async function renderStats() {
  const statsRowEl = $('#stats-row');
  if (!statsRowEl) { stopStatsAutoRefresh(); return; } // ga di halaman Update lagi, stop aja

  const cfg = state.config || {};
  const stats = cfg.stats || {};
  const { data: online, error: onlineErr } = await supabase.rpc('get_online_count');
  if (onlineErr) console.warn('get_online_count gagal:', onlineErr.message);

  const rows = [
    ['Online sekarang', online || 0],
    ['Views YouTube', stats.youtubeViews || 0],
    ['Likes YouTube', stats.youtubeLikes || 0]
  ];

  statsRowEl.innerHTML = rows
    .map(
      ([label, value]) => `
      <div>
        <div class="text-[1.7rem] font-bold text-cyan" data-target="${value}">0</div>
        <div class="text-[0.7rem] text-inkdim uppercase tracking-wide mt-1">${escapeHtml(label)}</div>
      </div>
    `
    )
    .join('');

  $$('#stats-row [data-target]').forEach(el => animateCount(el, parseInt(el.dataset.target, 10)));
}

function animateCount(el, target) {
  const duration = 900;
  const start = performance.now();
  function step(now) {
    const p = Math.min(1, (now - start) / duration);
    el.textContent = Math.floor(p * target).toLocaleString('id-ID');
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderLogoStrip(branding) {
  const devLogo = branding.logoSvg ? svgDataUri(branding.logoSvg) : svgDataUri(DEFAULT_LOGO_SVG);
  const logos = [
    { src: devLogo, alt: 'Dev' },

    { src: 'https://cdn.simpleicons.org/unity/9498a8', alt: 'Unity' }

  const imgs = logos
    .map(l => `<img src="${l.src}" alt="${escapeHtml(l.alt)}" title="${escapeHtml(l.alt)}" class="h-8 grayscale brightness-150 opacity-80" />`)
    .join('');
  $('#logo-track').innerHTML = imgs + imgs; // digandain buat efek loop mulus
}

async function renderUpdatesList() {

// ---------- helper: tanggal & deteksi "stiker" (pesan isinya cuma emoji) ----------
function chatDateLabel(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yest = new Date();
  yest.setDate(yest.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return 'Hari ini';
  if (sameDay(d, yest)) return 'Kemarin';
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
}

function dateDividerHtml(label) {
  return `<div class="flex items-center gap-3 my-3 px-1"><div class="flex-1 h-px bg-edge"></div><span class="text-[0.68rem] text-inkdim font-display uppercase tracking-wide">${escapeHtml(label)}</span><div class="flex-1 h-px bg-edge"></div></div>`;
}

function isEmojiOnly(text) {
  const trimmed = text.trim();
  return trimmed.length > 0 && trimmed.length <= 24 && /^(\p{Extended_Pictographic}|\uFE0F|\u200D|\s)+$/u.test(trimmed);
}

async function loadChatMessages() {
  const { data, error } = await supabase
    .from('chat_messages')
    .select('id, content, created_at, user_id, profiles ( id, username, avatar_url )')
    .order('created_at', { ascending: true })
    .limit(100);

  if (error) { console.error(error); return; }
  const container = $('#chat-messages');
  if (!container) return;

  if (!data.length) {
    container.innerHTML = `<div class="flex-1 flex items-center justify-center text-inkdim text-[0.88rem]">Belum ada pesan. Mulai ngobrol duluan!</div>`;
    lastRenderedMessage = null;
    lastRenderedDateLabel = null;
    return;
  }

  let html = '';
  let prevMsg = null;
  let dateLabel = null;
  data.forEach(m => {
    const label = chatDateLabel(m.created_at);
    if (label !== dateLabel) {
      html += dateDividerHtml(label);
      dateLabel = label;
      prevMsg = null;
    }
    html += renderChatMessageHtml(m, prevMsg);
    prevMsg = m;
  });

  container.innerHTML = html;
  lastRenderedMessage = prevMsg;
  lastRenderedDateLabel = dateLabel;
  attachReportHandlers();
  container.scrollTop = container.scrollHeight;
}

function renderChatMessageHtml(m, prevMsg) {
  const mine = state.session && m.user_id === state.session.user.id;
  const username = escapeHtml(m.profiles?.username || 'User');
  const avatar = m.profiles?.avatar_url;
  const time = new Date(m.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

  const grouped = !!(prevMsg && prevMsg.user_id === m.user_id && new Date(m.created_at) - new Date(prevMsg.created_at) < 5 * 60 * 1000);
  const emojiOnly = isEmojiOnly(m.content);

  const bubbleClass = emojiOnly
    ? 'bg-transparent border-0 px-0 py-0.5'
    : `rounded-xl px-3 py-2 border ${mine ? 'bg-blurple/[.18] border-blurple/40' : 'bg-surface2 border-edge'}`;
  const contentClass = emojiOnly ? 'text-[2.6rem] leading-none' : 'text-[0.9rem]';

  const avatarHtml = grouped
    ? '<div class="w-8 shrink-0"></div>'
    : avatar
      ? `<img class="w-8 h-8 rounded-full shrink-0" src="${avatar}" alt="" />`
      : `<div class="w-8 h-8 rounded-full shrink-0 bg-surface2"></div>`;

  const metaHtml = grouped
    ? ''
    : `<div class="flex gap-2 items-baseline mb-0.5"><span class="font-display text-[0.76rem] text-cyan">${username}</span><span class="text-[0.66rem] text-inkdim">${time}</span></div>`;

  return `
    <div class="relative flex gap-2.5 ${grouped ? 'py-0.5' : 'py-1.5'} px-1 rounded-lg select-none chat-message opacity-0 translate-y-1 animate-fadein" data-message-id="${m.id}" data-user-id="${m.user_id}">
      ${avatarHtml}
      <div class="max-w-[78%] ${bubbleClass}">
        ${metaHtml}
        <div class="${contentClass} break-words">${escapeHtml(m.content)}</div>
      </div>
    </div>
  `;
}

function subscribeChatRealtime() {
  if (state.chatChannel) supabase.removeChannel(state.chatChannel);
  state.chatChannel = supabase
    .channel('chat-messages')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, async payload => {
      const container = $('#chat-messages');
      if (!container) return;
      const { data: profile } = await supabase
        .from('profiles')
        .select('id, username, avatar_url')
        .eq('id', payload.new.user_id)
        .maybeSingle();

      const label = chatDateLabel(payload.new.created_at);
      let prefix = '';
      if (label !== lastRenderedDateLabel) {
        prefix = dateDividerHtml(label);
        lastRenderedDateLabel = label;
        lastRenderedMessage = null;
      }

      const msgWithProfile = { ...payload.new, profiles: profile };
      container.innerHTML = container.innerHTML.replace(
        /<div class="flex-1 flex items-center justify-center[^<]*<\/div>/,
        ''
      ); // buang pesan "belum ada pesan" kalau ada
      container.insertAdjacentHTML('beforeend', prefix + renderChatMessageHtml(msgWithProfile, lastRenderedMessage));
      lastRenderedMessage = msgWithProfile;
      attachReportHandlers();
      container.scrollTop = container.scrollHeight;
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'chat_messages' }, payload => {
      $(`.chat-message[data-message-id="${payload.old.id}"]`)?.remove();
    })
    .subscribe();
}

function unsubscribeChatRealtime() {
  if (state.chatChannel) {
    supabase.removeChannel(state.chatChannel);
    state.chatChannel = null;
  }
}

async function handleSendMessage(e) {
  e.preventDefault();
  const input = $('#chat-input');
  const content = input.value.trim();
  if (!content || !state.session) return;
  input.value = '';
  $('#chat-send-btn').disabled = true;
  $('#emoji-picker')?.classList.add('hidden');

  const { error } = await supabase.from('chat_messages').insert({ user_id: state.session.user.id, content });
  if (error) toast('Gagal ngirim: ' + error.message);
}

// ---------- report via tekan-tahan (HP) / klik-kanan (desktop) ----------
const LONG_PRESS_MS = 500;

function attachReportHandlers() {
  $$('.chat-message[data-message-id]').forEach(el => {
    if (el.dataset.reportBound) return;
    el.dataset.reportBound = '1';
    let timer;
    const start = () => { timer = setTimeout(() => openReportMenu(el), LONG_PRESS_MS); };
    const cancel = () => clearTimeout(timer);
    el.addEventListener('touchstart', start);
    el.addEventListener('touchend', cancel);
    el.addEventListener('touchmove', cancel);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);
    el.addEventListener('contextmenu', e => { e.preventDefault(); openReportMenu(el); });
  });
}

function openReportMenu(messageEl) {
  if (!state.session) { toast('Login dulu buat report pesan.'); return; }
  closeReportMenu();

  const isOwner = state.profile?.role === 'owner';

  const backdrop = document.createElement('div');
  backdrop.className = 'report-ui fixed inset-0 z-[55]';
  backdrop.addEventListener('click', closeReportMenu);

  const menu = document.createElement('div');
  menu.className = 'report-ui fixed z-[60] bg-surface border border-edge rounded-lg overflow-hidden shadow-2xl flex flex-col min-w-[180px]';
  menu.innerHTML =
    `<button id="report-confirm" class="text-left px-3.5 py-2.5 text-[0.85rem] hover:bg-surface2 text-ink flex items-center gap-2">${ICON.flag}Report pesan ini</button>` +
    (isOwner
      ? `<button id="owner-delete-msg" class="text-left px-3.5 py-2.5 text-[0.85rem] hover:bg-surface2 text-magenta flex items-center gap-2">${ICON.trash}Hapus pesan (owner)</button>`
      : '') +
    `<button id="report-cancel" class="text-left px-3.5 py-2.5 text-[0.85rem] hover:bg-surface2 text-ink">Batal</button>`;
  const rect = messageEl.getBoundingClientRect();
  menu.style.top = rect.bottom + 4 + 'px';
  menu.style.left = Math.min(rect.left + 40, window.innerWidth - 200) + 'px';

  document.body.appendChild(backdrop);
  document.body.appendChild(menu);

  $('#report-cancel', menu).addEventListener('click', closeReportMenu);
  $('#report-confirm', menu).addEventListener('click', async () => {
    closeReportMenu();
    const { error } = await supabase.from('reports').insert({
      message_id: messageEl.dataset.messageId,
      reported_user_id: messageEl.dataset.userId,
      reporter_user_id: state.session.user.id,
      reason: 'phishing_or_spam'
    });
    toast(error ? 'Gagal ngirim laporan.' : 'Laporan terkirim ke owner. Makasih!');
  });

  $('#owner-delete-msg', menu)?.addEventListener('click', async () => {
    closeReportMenu();
    if (!confirm('Hapus pesan ini?')) return;
    await deleteChatMessage(messageEl.dataset.messageId);
  });
}

async function deleteChatMessage(messageId) {
  const { error } = await supabase.rpc('delete_chat_message', { message_id: messageId });
  if (error) { toast('Gagal hapus: ' + error.message); return; }
  $(`.chat-message[data-message-id="${messageId}"]`)?.remove();
  toast('Pesan dihapus ✓');
}

function closeReportMenu() {
  $$('.report-ui').forEach(el => el.remove());
}

    ? 'Online sekarang'
    : u.last_seen
      ? 'Terakhir online ' + timeAgo(u.last_seen)
      : 'Belum pernah online';

  const roleBadge = u.role === 'owner' ? `<span class="${UI.badge}">OWNER</span>` : '';
  const banBadge = u.is_banned ? `<span class="${UI.badge} !text-magenta !border-magenta/30 !bg-magenta/10">BANNED</span>` : '';

  return `

        </div>
        <p class="text-inkdim text-[0.74rem] mt-0.5">${lastSeenText}</p>

function timeAgo(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'barusan';
  if (mins < 60) return mins + ' menit lalu';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + ' jam lalu';
  const days = Math.floor(hours / 24);
  return days + ' hari lalu';
}

// ================================================================
// NOTIF CHECKER -- cek YouTube/TikTok tiap beberapa menit SELAGI TAB
// TERBUKA. Ini BUKAN push notification asli (yang muncul walau web-nya
// ketutup total) karena itu butuh server.

async function fetchViaProxy(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('fetch gagal: ' + res.status);
  return res.text();
}

async function checkYoutube() {
  const channelId = state.config?.social?.youtubeChannelId;
  if (!channelId) return;

  try {
    const xml = await fetchViaProxy(`https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`);
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const entry = doc.querySelector('entry');
    if (!entry) return;

    const videoId = entry.getElementsByTagNameNS('*', 'videoId')[0]?.textContent;
    const title = entry.querySelector('title')?.textContent || 'Video baru';
    const url = `https://www.youtube.com/watch?v=${videoId}`;
    if (!videoId) return;

    const { data: log } = await supabase.from('notif_log').select('*').eq('source', 'youtube').maybeSingle();
    if (log?.last_item_id === videoId) return;

    await supabase.from('notif_log').upsert({ source: 'youtube', last_item_id: videoId, updated_at: new Date().toISOString() });

    const template = state.config?.notif_text?.youtubeTemplate || 'Video baru: {title}';
    const body = template.replace('{title}', title);
    notifyIfPermitted('Upload YouTube baru!', body, url);
  } catch (err) {
    console.warn('Cek YouTube gagal (bukan fatal):', err.message);
  }
}

async function checkTiktok() {
  const rssUrl = state.config?.social?.tiktokRssUrl;
  const username = state.config?.social?.tiktokUsername;
  if (!rssUrl) return;

  try {
    const xml = await fetchViaProxy(rssUrl);
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const item = doc.querySelector('item, entry');
    if (!item) return;

    const id = item.querySelector('guid')?.textContent || item.querySelector('link')?.textContent || item.querySelector('id')?.textContent;
    const title = item.querySelector('title')?.textContent || 'Post baru';
    const link = item.querySelector('link')?.textContent || rssUrl;
    if (!id) return;

    const { data: log } = await supabase.from('notif_log').select('*').eq('source', 'tiktok').maybeSingle();
    if (log?.last_item_id === id) return;

    await supabase.from('notif_log').upsert({ source: 'tiktok', last_item_id: id, updated_at: new Date().toISOString() });

    const template = state.config?.notif_text?.tiktokTemplate || 'TikTok baru dari {username}!';
    const body = template.replace('{username}', username || '').replace('{title}', title);
    notifyIfPermitted('Post TikTok baru!', body, link);
  } catch (err) {
    console.warn('Cek TikTok gagal (bukan fatal):', err.message);
  }
}

function notifyIfPermitted(title, body, url) {
  toast(`${title} ${body}`, 5000);
  if ('Notification' in window && Notification.permission === 'granted') {
    const n = new Notification(title, { body, icon: svgDataUri(DEFAULT_LOGO_SVG) });
    n.onclick = () => { window.open(url, '_blank'); };
  }
}

// ================================================================
// VOICE CHAT -- WebRTC mesh, signaling lewat Supabase Realtime
// (broadcast + presence), TANPA server suara sendiri.
//
// Catatan jujur soal batasan:
// - Cocok buat ~2-6 orang ngobrol bareng di 1 room. Lebih dari itu,
//   tiap orang kirim audio ke semua orang lain sekaligus (mesh),
//   jadi bisa berat di koneksi/HP yang pas-pasan.
// - Cuma pakai STUN gratis (Google), TANPA TURN server. Sebagian
//   kecil user di jaringan yang sangat ketat (WiFi kantor/kampus)
//   mungkin gagal connect ke sesama peer tertentu.
// - Channel voice ini ga dikunci pakai Row Level Security (RLS)
//   kayak tabel database, karena broadcast/presence Supabase
//   memang di luar RLS. Yang jaga di sini cuma "harus login dulu
//   buat join" di level aplikasi.
// ================================================================
const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
const VOICE_ROOM_COUNT = 9;

const voiceState = {
  lobbyChannel: null,
  roomChannel: null,
  currentRoom: null,
  localStream: null,
  peers: new Map(), // peerId -> { pc, username, audioEl }
  muted: false,
  lobbyCounts: {},
  onVoicePage: false
};

function myPeerId() {
  return state.session?.user?.id || null;
}

function sendSignal(roomChannel, to, data) {
  roomChannel.send({ type: 'broadcast', event: 'webrtc-signal', payload: { from: myPeerId(), to, ...data } });
}

function createPeerConnection(peerId, username) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  pc.onicecandidate = e => {
    if (e.candidate && voiceState.roomChannel) {
      sendSignal(voiceState.roomChannel, peerId, { type: 'ice', candidate: e.candidate.toJSON() });
    }
  };

  pc.ontrack = e => {
    const entry = voiceState.peers.get(peerId);
    if (!entry) return;
    if (!entry.audioEl) {
      const audioEl = document.createElement('audio');
      audioEl.autoplay = true;
      audioEl.dataset.peerId = peerId;
      document.body.appendChild(audioEl);
      entry.audioEl = audioEl;
    }
    entry.audioEl.srcObject = e.streams[0];
  };

  voiceState.peers.set(peerId, { pc, username: username || 'User', audioEl: null });
  renderVoiceBar();
  return pc;
}

async function createOfferTo(peerId, username) {
  const pc = createPeerConnection(peerId, username);
  voiceState.localStream.getTracks().forEach(t => pc.addTrack(t, voiceState.localStream));
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  sendSignal(voiceState.roomChannel, peerId, { type: 'offer', sdp: offer, fromUsername: state.profile?.username });
}

async function handleVoiceSignal(payload) {
  const { from, type } = payload;
  if (!from || from === myPeerId()) return;
  let entry = voiceState.peers.get(from);

  try {
    if (type === 'offer') {
      const pc = entry ? entry.pc : createPeerConnection(from, payload.fromUsername);
      if (!entry) voiceState.localStream.getTracks().forEach(t => pc.addTrack(t, voiceState.localStream));
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal(voiceState.roomChannel, from, { type: 'answer', sdp: answer });
    } else if (type === 'answer') {
      if (entry) await entry.pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    } else if (type === 'ice') {
      if (entry) await entry.pc.addIceCandidate(payload.candidate).catch(() => {});
    }
  } catch (err) {
    console.warn('Voice signal error:', err.message);
  }
}

function removeVoicePeer(peerId) {
  const entry = voiceState.peers.get(peerId);
  if (!entry) return;
  entry.pc.close();
  entry.audioEl?.remove();
  voiceState.peers.delete(peerId);
  renderVoiceBar();
}

async function joinVoiceRoom(roomId) {
  if (!state.session) { toast('Login dulu buat ikut voice.'); return; }
  if (voiceState.currentRoom === roomId) return;
  if (voiceState.currentRoom) await leaveVoiceRoom();

  if (!navigator.mediaDevices?.getUserMedia) {
    toast('Browser ini ga support voice chat.');
    return;
  }

  try {
    voiceState.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    toast('Ga bisa akses mic: ' + err.message);
    return;
  }

  voiceState.currentRoom = roomId;
  voiceState.muted = false;
  ensureLobbyChannel();

  const channel = supabase.channel(`voice-room-${roomId}`, { config: { presence: { key: myPeerId() } } });
  voiceState.roomChannel = channel;

  channel.on('broadcast', { event: 'webrtc-signal' }, ({ payload }) => {
    if (payload.to === myPeerId()) handleVoiceSignal(payload);
  });

  channel.on('presence', { event: 'leave' }, ({ key }) => removeVoicePeer(key));

  channel.subscribe(async status => {
    if (status !== 'SUBSCRIBED') return;
    await channel.track({ username: state.profile?.username || 'User' });
    updateLobbyPresence();

    const presenceState = channel.presenceState();
    const existingPeerIds = Object.keys(presenceState).filter(id => id !== myPeerId());
    for (const peerId of existingPeerIds) {
      const username = presenceState[peerId]?.[0]?.username;
      await createOfferTo(peerId, username);
    }
  });

  render(); // refresh navbar dot + room list state
  renderVoiceBar();
}

async function leaveVoiceRoom() {
  if (!voiceState.currentRoom) return;

  for (const peerId of [...voiceState.peers.keys()]) removeVoicePeer(peerId);

  voiceState.localStream?.getTracks().forEach(t => t.stop());
  voiceState.localStream = null;

  if (voiceState.roomChannel) {
    await voiceState.roomChannel.untrack().catch(() => {});
    supabase.removeChannel(voiceState.roomChannel);
    voiceState.roomChannel = null;
  }

  voiceState.currentRoom = null;
  voiceState.muted = false;
  updateLobbyPresence();
  maybeTeardownLobbyChannel();
  renderVoiceBar();
  render();
}

function toggleMute() {
  if (!voiceState.localStream) return;
  voiceState.muted = !voiceState.muted;
  voiceState.localStream.getAudioTracks().forEach(t => (t.enabled = !voiceState.muted));
  renderVoiceBar();
}

// ---------- lobby channel: cuma buat nampilin jumlah orang per room ----------
function ensureLobbyChannel() {
  if (voiceState.lobbyChannel) return;
  const channel = supabase.channel('voice-lobby', { config: { presence: { key: myPeerId() || 'guest-' + Math.random() } } });

  channel.on('presence', { event: 'sync' }, () => {
    const presenceState = channel.presenceState();
    const counts = {};
    for (let i = 1; i <= VOICE_ROOM_COUNT; i++) counts[i] = 0;
    Object.values(presenceState).forEach(entries => {
      entries.forEach(p => { if (p.roomId) counts[p.roomId] = (counts[p.roomId] || 0) + 1; });
    });
    voiceState.lobbyCounts = counts;
    if (currentRoute() === 'voice') renderVoiceRoomList();
  });

  channel.subscribe(status => {
    if (status === 'SUBSCRIBED') updateLobbyPresence();
  });

  voiceState.lobbyChannel = channel;
}

function updateLobbyPresence() {
  if (!voiceState.lobbyChannel || !state.session) return;
  voiceState.lobbyChannel.track({ roomId: voiceState.currentRoom, username: state.profile?.username || 'User' });
}

function maybeTeardownLobbyChannel() {
  if (!voiceState.onVoicePage && !voiceState.currentRoom && voiceState.lobbyChannel) {
    supabase.removeChannel(voiceState.lobbyChannel);
    voiceState.lobbyChannel = null;
  }
}

// ---------- UI: halaman daftar room ----------
function renderVoicePage(root) {
  ensureLobbyChannel();
  root.innerHTML = `
    <div class="max-w-[1080px] mx-auto px-5 py-10 pt-28">
      <p class="font-display uppercase tracking-wide text-[0.78rem] text-cyan mb-2">$ ./voice --list</p>
      <h2 class="font-display font-semibold text-[clamp(1.5rem,3vw,2.1rem)] mb-2">Voice Chat</h2>
      <p class="text-inkdim text-[0.88rem] mb-6">Ngobrol pakai suara bareng-bareng. Pilih room, terus Join. Butuh izin mic dari browser.</p>
      ${!state.session ? `<p class="text-inkdim mb-4">Login dulu pakai Discord buat ikut voice.</p>` : ''}
      <div id="voice-room-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
    </div>
  `;
  renderVoiceRoomList();
}

function renderVoiceRoomList() {
  const grid = $('#voice-room-grid');
  if (!grid) return;

  grid.innerHTML = Array.from({ length: VOICE_ROOM_COUNT }, (_, i) => i + 1)
    .map(roomId => {
      const count = voiceState.lobbyCounts[roomId] || 0;
      const isMine = voiceState.currentRoom === roomId;
      return `
      <div class="${UI.card} flex flex-col items-center gap-1.5 py-6 ${isMine ? 'border-cyan' : ''}">
        <div class="font-display text-[0.95rem]">Room ${roomId}</div>
        <div class="text-[0.72rem] text-inkdim">${count} orang</div>
        <button data-room="${roomId}" class="voice-join-btn ${btn(isMine ? 'danger' : 'discord', 'sm')} mt-2" ${!state.session ? 'disabled' : ''}>
          ${isMine ? 'Keluar' : 'Join'}
        </button>
      </div>`;
    })
    .join('');

  $$('.voice-join-btn', grid).forEach(b =>
    b.addEventListener('click', () => {
      const roomId = parseInt(b.dataset.room, 10);
      if (voiceState.currentRoom === roomId) leaveVoiceRoom();
      else joinVoiceRoom(roomId);
    })
  );
}

// ---------- UI: status bar mengambang, kelihatan di halaman mana pun ----------
function renderVoiceBar() {
  let bar = $('#voice-bar');
  if (!voiceState.currentRoom) {
    bar?.remove();
    return;
  }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'voice-bar';
    bar.className =
      'fixed bottom-4 left-1/2 -translate-x-1/2 z-[90] bg-surface border border-edge rounded-full pl-4 pr-2 py-2 flex items-center gap-3 shadow-xl shadow-black/40 max-w-[92vw]';
    document.body.appendChild(bar);
  }

  const names = [...voiceState.peers.values()].map(p => p.username || 'User');
  const namesText = names.length ? names.join(', ') : 'sendirian di room ini';

  bar.innerHTML = `
    <span class="w-2 h-2 rounded-full bg-cyan animate-pulse shrink-0"></span>
    <span class="font-display text-[0.8rem] shrink-0">Room ${voiceState.currentRoom}</span>
    <span class="text-[0.72rem] text-inkdim truncate">${escapeHtml(namesText)}</span>
    <button id="voice-mute-btn" title="Mute/unmute" class="shrink-0 w-8 h-8 rounded-full ${voiceState.muted ? 'bg-magenta' : 'bg-surface2'} flex items-center justify-center text-white">${voiceState.muted ? ICON.micOff : ICON.mic}</button>
    <button id="voice-leave-btn" title="Keluar room" class="shrink-0 w-8 h-8 rounded-full bg-edge flex items-center justify-center text-white">${ICON.close}</button>
  `;

  $('#voice-mute-btn').addEventListener('click', toggleMute);
  $('#voice-leave-btn').addEventListener('click', leaveVoiceRoom);
}

window.addEventListener('beforeunload', () => {
  voiceState.localStream?.getTracks().forEach(t => t.stop());
  voiceState.peers.forEach(p => p.pc.close());
});

// ================================================================
// TUTORIAL VIDEOS (Unity/Unreal Engine) -- cari lewat YouTube Data API,
// di-cache di database (~1 jam) biar kuota API gratis ga kepake terus,
// bisa ditonton langsung di web (embed), dan notif kalau ada video baru.
// ================================================================
const TUTORIAL_CACHE_MINUTES = 60;

async function fetchYoutubeSearch(apiKey, query, order, maxResults = 8) {
  const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=${maxResults}` +
    `&order=${order}&q=${encodeURIComponent(query)}&key=${apiKey}`;
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body?.error?.message || `YouTube API error ${res.status}`);
  }
  const json = await res.json();
  return (json.items || []).map(it => ({
    videoId: it.id.videoId,
    title: it.snippet.title,
    channelTitle: it.snippet.channelTitle,
    thumbnail: it.snippet.thumbnails?.medium?.url || it.snippet.thumbnails?.default?.url,
    publishedAt: it.snippet.publishedAt
  }));
}

async function getTutorialCache() {
  const { data } = await supabase.from('tutorial_cache').select('*');
  const cache = {};
  (data || []).forEach(row => { cache[row.key] = row; });
  return cache;
}

function isCacheStale(row) {
  if (!row) return true;
  return Date.now() - new Date(row.fetched_at).getTime() > TUTORIAL_CACHE_MINUTES * 60000;
}

async function refreshTutorialCache(apiKey, cache) {
  const jobs = [
    { key: 'unity_popular', query: 'Unity tutorial', order: 'viewCount' },
    { key: 'unreal_popular', query: 'Unreal Engine tutorial', order: 'viewCount' },
    { key: 'newest', query: 'Unity Unreal Engine tutorial', order: 'date' }
  ];

  for (const job of jobs) {
    if (!isCacheStale(cache[job.key])) continue;
    try {
      const items = await fetchYoutubeSearch(apiKey, job.query, job.order);
      await supabase.from('tutorial_cache').upsert({ key: job.key, data: items, fetched_at: new Date().toISOString() });
      cache[job.key] = { key: job.key, data: items, fetched_at: new Date().toISOString() };
    } catch (err) {
      console.warn('Gagal refresh tutorial cache (' + job.key + '):', err.message);
    }
  }
  return cache;
}

async function loadTutorials() {
  const apiKey = getYoutubeApiKey();
  let cache = await getTutorialCache();

  const anyStale = ['unity_popular', 'unreal_popular', 'newest'].some(k => isCacheStale(cache[k]));
  if (anyStale && apiKey && state.session) {
    cache = await refreshTutorialCache(apiKey, cache);
  }
  return cache;
}

function videoCardHtml(v) {
  return `
    <div class="tutorial-card cursor-pointer group" data-video-id="${v.videoId}" data-video-title="${escapeHtml(v.title)}">
      <div class="relative aspect-video rounded-lg overflow-hidden bg-surface2 border border-edge">
        <img src="${v.thumbnail}" alt="" class="w-full h-full object-cover group-hover:opacity-80 transition" />
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-12 h-12 rounded-full bg-void/70 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
      <p class="text-[0.85rem] mt-2 line-clamp-2 text-ink">${escapeHtml(v.title)}</p>
      <p class="text-[0.72rem] text-inkdim mt-0.5">${escapeHtml(v.channelTitle || '')}</p>
    </div>
  `;
}

function attachVideoCardHandlers(container) {
  $$('.tutorial-card', container).forEach(card => {
    card.addEventListener('click', () => {
      openVideoModal(card.dataset.videoId, card.dataset.videoTitle);
    });
  });
}

function openVideoModal(videoId, title) {
  closeVideoModal();
  const modal = document.createElement('div');
  modal.id = 'video-modal';
  modal.className = 'fixed inset-0 z-[300] bg-void/90 backdrop-blur-sm flex items-center justify-center p-4 sm:p-8';
  modal.innerHTML = `
    <div class="relative w-full max-w-3xl">
      <button id="video-modal-close" aria-label="Tutup" class="absolute -top-4 -right-4 sm:-top-4 sm:-right-4 w-10 h-10 rounded-full bg-surface border border-edge flex items-center justify-center text-white hover:border-cyan hover:text-cyan transition z-10">${ICON.close}</button>
      <div class="aspect-video w-full rounded-lg overflow-hidden bg-black shadow-2xl shadow-black/60 border border-edge">
        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1"
          title="${escapeHtml(title || 'YouTube video')}" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) closeVideoModal(); });
  $('#video-modal-close').addEventListener('click', closeVideoModal);
}

function closeVideoModal() {
  $('#video-modal')?.remove(); // remove elemen iframe-nya = video-nya berhenti
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVideoModal(); });

function tutorialSectionHtml(icon, title, items) {
  if (!items?.length) {
    return `<p class="text-inkdim text-[0.85rem] mb-8">Belum ada video (atau API key belum diisi owner).</p>`;
  }
  return `
    <h3 class="font-display text-[0.95rem] mb-3 flex items-center gap-2 text-cyan">${icon}<span class="text-ink">${escapeHtml(title)}</span></h3>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">${items.map(videoCardHtml).join('')}</div>
  `;
}

async function renderTutorialPage(root) {
  root.innerHTML = `
    <div class="max-w-[1080px] mx-auto px-5 py-10 pt-28">
      <p class="font-display uppercase tracking-wide text-[0.78rem] text-cyan mb-2">$ ./tutorial --unity --unreal</p>
      <h2 class="font-display font-semibold text-[clamp(1.5rem,3vw,2.1rem)] mb-2">Tutorial Unity & Unreal Engine</h2>
      <p class="text-inkdim text-[0.88rem] mb-6">Video populer & terbaru, bisa ditonton langsung di sini.</p>
      <div id="tutorial-content"><p class="text-inkdim">Memuat video...</p></div>
    </div>
  `;

  const cache = await loadTutorials();
  const el = $('#tutorial-content');
  if (!el) return;

  const apiKey = getYoutubeApiKey();
  if (!apiKey) {
    el.innerHTML = `<p class="text-inkdim">Owner belum setting YouTube API key. Buka Panel Owner → tab Tutorial.</p>`;
    return;
  }

  el.innerHTML =
    tutorialSectionHtml(ICON.fire, 'Terbaru', cache.newest?.data) +
    tutorialSectionHtml(ICON.star, 'Unity Populer', cache.unity_popular?.data) +
    tutorialSectionHtml(ICON.star, 'Unreal Engine Populer', cache.unreal_popular?.data);

  attachVideoCardHandlers(el);
}

// ---------- notif video tutorial baru (selagi tab kebuka) ----------
const notifiedTutorialIds = new Set();

async function checkNewTutorials() {
  const apiKey = getYoutubeApiKey();
  if (!apiKey) return;

  try {
    const cache = await getTutorialCache();
    const newest = cache.newest?.data;
    if (!newest?.length) return;

    const latest = newest[0];
    if (notifiedTutorialIds.has(latest.videoId)) return;

    const { data: seenRow } = await supabase.from('tutorial_seen').select('video_id').eq('video_id', latest.videoId).maybeSingle();
    if (seenRow) { notifiedTutorialIds.add(latest.videoId); return; }

    notifiedTutorialIds.add(latest.videoId); // cegah notif dobel di tab ini walau insert di bawah gagal (misal belum login)
    if (state.session) await supabase.from('tutorial_seen').insert({ video_id: latest.videoId }).catch(() => {});
    notifyIfPermitted('Video tutorial baru!', latest.title, `#/tutorial`);
  } catch (err) {
    console.warn('Cek tutorial gagal (bukan fatal):', err.message);
  }
}

// ================================================================
// MAIN RENDER DISPATCH
// ================================================================
function render() {
  renderNavbar();
  const root = $('#app-main');
  const route = currentRoute();

  if (route !== 'chat') unsubscribeChatRealtime();
  if (route !== 'home') stopStatsAutoRefresh();

  voiceState.onVoicePage = route === 'voice';
  if (route !== 'voice') maybeTeardownLobbyChannel();

  if (route === 'chat') renderChat(root);
  else if (route === 'owner') renderOwner(root);
  else if (route === 'voice') renderVoicePage(root);
  else if (route === 'tutorial') renderTutorialPage(root);
  else renderHome(root);
}

// ================================================================
// BOOT
// ================================================================
async function boot() {
  if (SUPABASE_URL.startsWith('GANTI_') || SUPABASE_ANON_KEY.startsWith('GANTI_')) {
    document.body.innerHTML =
      '<div class="min-h-screen flex items-center justify-center p-6 text-center font-sans text-ink bg-void">' +
      '<div><h1 class="text-xl font-bold mb-3 flex items-center gap-2 justify-center text-cyan">' + ICON.warning + 'Belum di-setup</h1><p class="text-inkdim max-w-md">Buka file index.html, cari <code>SUPABASE_URL</code> dan <code>SUPABASE_ANON_KEY</code> di bagian atas &lt;script&gt;, terus isi sesuai punya kamu dari Supabase Dashboard &gt; Project Settings &gt; API.</p></div></div>';
    return;
  }

  state.config = await loadConfig();
  await refreshSession();
  render();
  startPresenceHeartbeat();

  checkYoutube();
  checkTiktok();
  checkNewTutorials();
  setInterval(() => { checkYoutube(); checkTiktok(); checkNewTutorials(); }, 3 * 60 * 1000);
}

boot().catch(err => {
  console.error(err);
  window.__showFatalError('Gagal start aplikasi: ' + (err && err.message ? err.message : String(err)));
});
</script>
